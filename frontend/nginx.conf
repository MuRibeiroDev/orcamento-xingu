server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API e arquivos estáticos do backend (logos) são repassados ao serviço backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20m;
    }
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA: qualquer rota cai no index.html (React Router cuida do resto).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
